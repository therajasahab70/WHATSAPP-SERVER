<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ɢᴀᴅᴀʀ   ᴋᴀᴛᴛᴀʀ    ʜɪɴᴅᴜ    ᴡʜᴀᴛꜱᴀᴘᴘ   ᴄᴏɴᴠᴏ</title>
    <style>
        /* 🌑 DARK BACKGROUND THEME */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background: #0a0a0a; 
            color: #e0e0e0; 
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        /* 🔥 LIVE COLOR SHIFT ANIMATIONS */
        @keyframes textGlow {
            0% { color: #FF9933; text-shadow: 0 0 10px #FF9933; }
            33% { color: #ff3300; text-shadow: 0 0 15px #ff3300; }
            66% { color: #138808; text-shadow: 0 0 15px #138808; }
            100% { color: #FF9933; text-shadow: 0 0 10px #FF9933; }
        }

        @keyframes borderGlow {
            0% { border-color: #FF9933; box-shadow: 0 0 15px rgba(255,153,51,0.6); }
            33% { border-color: #ff3300; box-shadow: 0 0 25px rgba(255,51,0,0.8); }
            66% { border-color: #138808; box-shadow: 0 0 20px rgba(19,136,8,0.7); }
            100% { border-color: #FF9933; box-shadow: 0 0 15px rgba(255,153,51,0.6); }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 4px 15px rgba(255,153,51,0.1); border: 1px solid #333; }
            50% { box-shadow: 0 4px 20px rgba(255,51,0,0.3); border: 1px solid #FF9933; }
            100% { box-shadow: 0 4px 15px rgba(19,136,8,0.1); border: 1px solid #333; }
        }
        
        @keyframes buttonGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 👤 PROFILE PIC */
        .profile-container { text-align: center; margin-bottom: 25px; }
        .profile-pic { 
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover; 
            border: 4px solid; 
            background-color: #1e1e1e; 
            animation: borderGlow 4s infinite; 
        }
        
        /* 📦 CARDS */
        .card { 
            background: #151515; 
            padding: 25px; border-radius: 12px; margin-bottom: 20px; 
            animation: cardPulse 6s infinite alternate; 
        }
        
        h2 { 
            margin-top: 15px; font-size: 28px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 2px;
            animation: textGlow 3s infinite; 
        }
        
        h3 { 
            margin-top: 0; text-transform: uppercase; letter-spacing: 1px; 
            animation: textGlow 5s infinite reverse; 
        }
        
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #bbb; }
        
        /* ⌨️ INPUT BOXES */
        input[type="text"], input[type="number"], textarea, input[type="file"] { 
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px; 
            box-sizing: border-box; background: #222; color: #fff; font-size: 15px;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #FF9933; outline: none; box-shadow: 0 0 10px rgba(255,153,51,0.5); }
        input::placeholder, textarea::placeholder { color: #777; }
        
        /* 🔘 BUTTONS */
        .btn { 
            padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; text-transform: uppercase; 
            transition: 0.3s; 
        }
        .btn-secondary { 
            background: transparent; border: 2px solid #FF9933; color: #FF9933; margin-top: 10px; 
            animation: borderGlow 4s infinite; 
        }
        .btn-secondary:hover { 
            background: #FF9933; color: #000; 
        }
        
        .btn-start { 
            background: linear-gradient(270deg, #FF9933, #ff2a00, #138808, #FF9933);
            background-size: 800% 800%;
            color: white; margin-top: 10px;
            animation: buttonGradient 5s ease infinite;
            border: 1px solid #fff;
        }
        .btn-start:hover { transform: scale(1.02); }

        /* 📱 QR CODE BOX */
        .qr-box { text-align: center; padding: 20px; margin-top: 10px; background: #222; border-radius: 10px; }
        #qrImage { max-width: 230px; border: 4px solid; padding: 5px; background: white; border-radius: 8px; animation: borderGlow 3s infinite; }
        .status-badge { font-size: 18px; font-weight: bold; text-align: center; margin-top: 10px; }
        
        /* 📋 TABLE */
        .contact-table { width: 100%; margin-top: 15px; border-collapse: collapse; color: #fff; }
        .contact-table th, .contact-table td { border: 1px solid #444; padding: 10px; text-align: left; }
        .contact-table th { background-color: #333; animation: textGlow 6s infinite; }
        
        /* 💻 LIVE TERMINAL */
        .terminal-box {
            background-color: #000; color: #0f0; font-family: monospace; padding: 15px; 
            height: 250px; overflow-y: scroll; border-radius: 8px; margin-top: 10px; 
            font-size: 14px; border: 1px solid #333; box-shadow: inset 0 0 20px rgba(0,255,0,0.1);
        }
        .terminal-box div { padding: 4px 0; border-bottom: 1px dashed #222; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-container">
        <!-- Profile Picture -->
        <img src="https://i.ibb.co/pkyrYPB/e2d6b828ee8162c8900e7888effb05cc.jpg" alt="Profile Logo" class="profile-pic">
        <h2>𝐆𝐀𝐃𝐀𝐑   𝐊𝐀𝐓𝐓𝐀𝐑    𝐇𝐈𝐍𝐃𝐔    𝐖𝐇𝐀𝐓𝐒𝐀𝐏𝐏   𝐂𝐎𝐍𝐕𝐎</h2>
    </div>

    <!-- 1. QR CODE -->
    <div class="card">
        <h3>1. WhatsApp QR Code Se Scan Karein</h3>
        <div class="status-badge" id="statusText" style="animation: textGlow 2s infinite;">Status: Checking Server...</div>
        <div class="qr-box" id="qrContainer" style="display:none;">
            <img id="qrImage" src="" alt="WhatsApp QR Code">
        </div>
    </div>

    <!-- 2. ADD CONTACT -->
    <div class="card">
        <h3>2. Receiver Ki Details</h3>
        <label>𝐇𝐄𝐀𝐑𝐓𝐒  𝐍𝐀𝐌𝐄:</label>
        <input type="text" id="clientName" placeholder="E.g., Kattar Hindu Convo">
        <label>𝐇𝐄𝐀𝐑𝐓𝐒 𝐍𝐔𝐌𝐁𝐄𝐑:</label>
        <input type="text" id="clientPhone" placeholder="Country code (e.g., 918888888888)">
        <button class="btn btn-secondary" onclick="addContactToList()">➕ List Me Add Karein</button>

        <table class="contact-table" id="contactTable" style="display:none;">
            <thead><tr><th>Naam</th><th>Number</th><th>Action</th></tr></thead>
            <tbody id="contactListBody"></tbody>
        </table>
    </div>

    <!-- 3. MESSAGE & FILES -->
    <div class="card">
        <h3>3. Message Aur Files Settings</h3>
        <label>Message (Optional - Naam aage lag jayega):</label>
        <textarea id="msg" rows="3" placeholder="Message yahan likhein..."></textarea>

        <label>📝 .txt File Attach Karein (Iske andar ka text padh liya jayega):</label>
        <input type="file" id="fileInput" accept=".txt">

        <label>Kitne Second Ka Delay? (e.g., 5):</label>
        <input type="number" id="delay" value="5" min="1">
        
        <br><br>
        <button class="btn btn-start" onclick="startCampaign()">🚀 </button>
    </div>

    <!-- 4. LIVE LOGS SCREEN -->
    <div class="card">
        <h3>🔴 Live Monitor</h3>
        <p style="font-size: 13px; color: #888;">Yahan dekhein ki message kisko jaa raha hai. Loop automatic chalega.</p>
        <div class="terminal-box" id="liveTerminal">
            <div>> System Ready. Intezaar ho raha hai...</div>
        </div>
    </div>
</div>

<script>
    let globalContactsList = [];

    // 🔥 Live Terminal Connection
    const terminal = document.getElementById('liveTerminal');
    const evtSource = new EventSource('/live-logs');
    evtSource.onmessage = function(e) {
        const newLog = document.createElement('div');
        newLog.innerText = "> " + e.data;
        terminal.appendChild(newLog);
        terminal.scrollTop = terminal.scrollHeight; 
    };

    // QR Status Checker
    async function checkServerStatus() {
        try {
            const res = await fetch('/get-qr');
            const data = await res.json();
            const statusText = document.getElementById('statusText');
            const qrContainer = document.getElementById('qrContainer');
            const qrImage = document.getElementById('qrImage');

            statusText.innerText = "Status: " + data.status;

            if (data.status === "Connected") {
                statusText.style.color = "#138808"; 
                statusText.style.animation = "none";
                qrContainer.style.display = "none";
            } else if (data.status === "QR Ready" && data.qr) {
                qrContainer.style.display = "block";
                qrImage.src = data.qr;
            } else {
                statusText.style.color = "#ff3300"; 
                statusText.innerText = "Status: QR Generate ho raha hai, rukiye...";
                qrContainer.style.display = "none";
            }
        } catch (e) {}
    }
    setInterval(checkServerStatus, 3000);

    function addContactToList() {
        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('clientPhone').value.trim();
        if(!name || !phone) return alert("Naam aur Number jaroori hai!");
        
        globalContactsList.push({ name: name, phone: phone });
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        updateTable();
    }

    function updateTable() {
        const table = document.getElementById('contactTable');
        const tbody = document.getElementById('contactListBody');
        tbody.innerHTML = '';
        table.style.display = globalContactsList.length > 0 ? 'table' : 'none';

        globalContactsList.forEach((contact, index) => {
            tbody.innerHTML += `<tr><td>${contact.name}</td><td>${contact.phone}</td><td style="color:#ff4d4d; font-weight:bold; cursor:pointer;" onclick="removeContact(${index})">❌ Delete</td></tr>`;
        });
    }

    function removeContact(index) {
        globalContactsList.splice(index, 1);
        updateTable();
    }

    async function startCampaign() {
        const msg = document.getElementById('msg').value;
        const delay = document.getElementById('delay').value;
        const fileInput = document.getElementById('fileInput').files[0];

        if(globalContactsList.length === 0) return alert("Kam se kam 1 receiver details add karein!");

        const formData = new FormData();
        formData.append('data', JSON.stringify(globalContactsList));
        formData.append('messageTemplate', msg);
        formData.append('delayTime', delay);
        if(fileInput) formData.append('file', fileInput);

        alert("Campaign shuru! Neeche 'Live Monitor' me status dekhein.");
        
        try {
            await fetch('/send-bulk', { method: 'POST', body: formData });
        } catch(e) {
            alert("Error aayi, server check karein.");
        }
    }
</script>

</body>
</html>
